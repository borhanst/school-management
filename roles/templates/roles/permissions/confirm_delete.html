{% extends 'roles/base.html' %}

{% block role_content %}
<div class="max-w-md mx-auto">
    <div class="bg-white shadow-sm rounded-lg border border-gray-200 p-6">
        <div class="text-center">
            <svg class="mx-auto h-12 w-12 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <h3 class="mt-4 text-lg font-medium text-gray-900">Delete Permission Type?</h3>
            <p class="mt-2 text-sm text-gray-500">
                Are you sure you want to delete the permission type <strong>{{ object.name }}</strong> from module <strong>{{ object.module.name }}</strong>?
                This action cannot be undone.
            </p>
        </div>
        
        <form method="post" class="mt-6 flex justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'roles:permission_list' %}" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                Cancel
            </a>
            <button type="submit" class="px-4 py-2 bg-red-600 border border-transparent rounded-md text-sm font-medium text-white hover:bg-red-700">
                Delete
            </button>
        </form>
    </div>
</div>
{% endblock %}
