{% extends "base.html" %}

{% block title %}{{ title }} - School Management{% endblock %}

{% block content %}
<div class="max-w-2xl p-6">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-4">{{ title }}</h1>
        <p class="text-gray-600 mb-6">Are you sure you want to delete <strong>{{ object }}</strong>?</p>
        <form method="post" class="flex justify-end gap-3">
            {% csrf_token %}
            <a href="{% url cancel_url %}" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50">Cancel</a>
            <button type="submit" class="px-6 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
