{% extends 'base.html' %}

{% block title %}Coming Soon - {{ module_name }}{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="text-center max-w-lg">
        <div class="mb-8">
            <div class="w-32 h-32 mx-auto bg-gradient-to-br from-yellow-100 to-orange-100 rounded-full flex items-center justify-center">
                <i class="fas {{ module_icon }} text-6xl text-yellow-600"></i>
            </div>
        </div>
        
        <h1 class="text-4xl font-bold text-gray-800 mb-3">{{ module_name }}</h1>
        
        <div class="mb-6">
            <span class="inline-block bg-yellow-100 text-yellow-700 text-sm px-4 py-2 rounded-full font-semibold">
                <i class="fas fa-clock mr-2"></i>Coming Soon
            </span>
        </div>
        
        <p class="text-gray-600 text-lg mb-8">{{ description }}</p>
        
        <div class="flex items-center justify-center space-x-4">
            <a href="{% url 'dashboard:index' %}" 
               class="inline-flex items-center px-6 py-3 bg-primary-600 text-white rounded-lg hover:bg-primary-700 transition-colors">
                <i class="fas fa-home mr-2"></i>
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
{% endblock %}
