{% extends 'base.html' %}
{% load permission_tags %}

{% block title %}Edit Question Paper - {{ paper.name }}{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="{% url 'questions:paper-detail' paper.pk %}" class="text-primary-600 hover:text-primary-700">
        <i class="fas fa-arrow-left mr-2"></i>Back to Question Paper
    </a>
</div>

<div class="max-w-3xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="p-6 border-b border-gray-100 bg-gradient-to-r from-purple-50 to-blue-50">
            <div class="flex items-center">
                <div class="p-3 bg-purple-100 rounded-lg mr-4">
                    <i class="fas fa-edit text-2xl text-purple-600"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Edit Question Paper</h1>
                    <p class="text-gray-600 mt-1">{{ paper.name }}</p>
                </div>
            </div>
        </div>

        <form method="post" class="p-6 space-y-6">
            {% csrf_token %}

            <!-- Paper Name -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Paper Name <span class="text-red-500">*</span>
                </label>
                <input type="text" name="name" value="{{ paper.name }}" required
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
            </div>

            <!-- Paper Type -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Paper Type</label>
                <select name="paper_type"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <option value="test" {% if paper.paper_type == "test" %}selected{% endif %}>Test</option>
                    <option value="quiz" {% if paper.paper_type == "quiz" %}selected{% endif %}>Quiz</option>
                    <option value="midterm" {% if paper.paper_type == "midterm" %}selected{% endif %}>Midterm Exam</option>
                    <option value="final" {% if paper.paper_type == "final" %}selected{% endif %}>Final Exam</option>
                    <option value="practice" {% if paper.paper_type == "practice" %}selected{% endif %}>Practice Paper</option>
                    <option value="mock" {% if paper.paper_type == "mock" %}selected{% endif %}>Mock Exam</option>
                </select>
            </div>

            <!-- Difficulty -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Difficulty</label>
                <select name="difficulty"
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
                    <option value="easy" {% if paper.difficulty == "easy" %}selected{% endif %}>Easy</option>
                    <option value="medium" {% if paper.difficulty == "medium" %}selected{% endif %}>Medium</option>
                    <option value="hard" {% if paper.difficulty == "hard" %}selected{% endif %}>Hard</option>
                    <option value="mixed" {% if paper.difficulty == "mixed" %}selected{% endif %}>Mixed</option>
                </select>
            </div>

            <!-- Duration -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Duration (minutes)</label>
                <input type="number" name="duration_minutes" value="{{ paper.duration_minutes }}" min="10" max="360"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500">
            </div>

            <!-- Instructions -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Instructions (Optional)</label>
                <textarea name="instructions" rows="4"
                          class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500"
                          placeholder="General instructions for students...">{{ paper.instructions }}</textarea>
            </div>

            <!-- Published -->
            <div class="flex items-center">
                <input type="checkbox" name="is_published" id="is_published" {% if paper.is_published %}checked{% endif %}
                       class="w-4 h-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500">
                <label for="is_published" class="ml-2 text-sm text-gray-700">Published</label>
            </div>

            <!-- Submit -->
            <div class="flex justify-end gap-3 pt-4">
                <a href="{% url 'questions:paper-detail' paper.pk %}"
                   class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
                <button type="submit"
                        class="px-6 py-2 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition-colors">
                    <i class="fas fa-save mr-2"></i>Save Changes
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
