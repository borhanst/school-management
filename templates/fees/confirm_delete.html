{% extends "base.html" %}

{% block title %}{{ title }} - School Management{% endblock %}

{% block content %}
<div class="max-w-2xl p-6">
    <div class="rounded-xl border border-gray-100 bg-white p-6 shadow-sm">
        <h1 class="mb-4 text-2xl font-bold text-gray-800">{{ title }}</h1>
        <p class="mb-6 text-gray-600">Are you sure you want to delete <strong>{{ object }}</strong>?</p>
        <form method="post" class="flex justify-end gap-3">
            {% csrf_token %}
            <a href="{% url cancel_url %}" class="rounded-lg border border-gray-300 px-6 py-2 text-gray-700 hover:bg-gray-50">Cancel</a>
            <button type="submit" class="rounded-lg bg-red-600 px-6 py-2 text-white hover:bg-red-700">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
